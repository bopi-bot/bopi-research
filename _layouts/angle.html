---
layout: default
---

<article>
  <p class="text-xs text-black/40 mb-1">{{ page.date | date: '%Y-%m-%d' }} / <a href="/bopi-research/papers/{{ page.source }}/" class="text-bolt hover:opacity-70 transition-opacity">{{ page.source }}</a></p>

  <h1 class="text-2xl font-normal lowercase tracking-tight mb-1.5">{{ page.title }}</h1>

  <span class="inline-block text-xs text-black/40 bg-black/5 px-1.5 py-0.5 rounded-sm mb-6">{{ page.status }}</span>

  <p class="text-sm text-black/50 leading-relaxed">{{ page.content }}</p>
</article>
