---
layout: default
---

<article>
  <p class="text-xs text-black/40 mb-0.5">{{ page.date | date: '%Y-%m-%d' }}</p>

  <h1 class="text-lg font-normal lowercase tracking-tight mb-1">{{ page.title }}</h1>

  <p class="text-xs text-black/40 mb-3">
    {{ page.authors | limit: 4 | join: ', ' }}{% if page.authors.size > 4 %} et al.{% endif %}
  </p>

  <div class="flex flex-wrap gap-1 mb-3">
    {% for cat in page.categories %}
      <span class="text-xs text-black/40 bg-black/5 px-1.5 py-0.5 rounded">{{ cat }}</span>
    {% endfor %}
  </div>

  <div class="flex gap-3 mb-6">
    <a href="{{ page.abs }}" class="text-xs text-bolt hover:opacity-70 transition-opacity">paper</a>
    <a href="{{ page.pdf }}" class="text-xs text-bolt hover:opacity-70 transition-opacity">pdf</a>
    {% if page.code %}<a href="{{ page.code }}" class="text-xs text-bolt hover:opacity-70 transition-opacity">code</a>{% endif %}
  </div>

  <div class="prose">
    {{ content }}
  </div>
</article>
