---
layout: default
---

<article>
  <p class="text-xs text-black/40 mb-0.5">{{ page.date | date: '%Y-%m-%d' }} / <a href="/bopi-research/papers/{{ page.source }}/" class="text-bolt hover:opacity-70 transition-opacity">{{ page.source }}</a></p>
  <h1 class="text-lg font-normal lowercase tracking-tight mb-1">{{ page.title }}</h1>
  <p class="text-sm text-black/50 leading-relaxed">{{ page.content }}</p>
</article>
