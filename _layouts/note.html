---
layout: default
---

<article>
  <p class="text-xs text-black/40 mb-0.5">{{ page.date | date: '%Y-%m-%d' }} / {{ page.type }}{% for src in page.sources %} / <a href="/bopi-research/papers/{{ src }}/" class="text-bolt hover:opacity-70">{{ src }}</a>{% endfor %}</p>
  <h1 class="text-lg font-normal lowercase tracking-tight mb-1">{{ page.title }}</h1>
  <p class="text-sm text-black/50 leading-relaxed">{{ page.content }}</p>
</article>
